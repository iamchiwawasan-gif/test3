<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>共有仕事TODO</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --main: #111827;
      --danger: #ef4444;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }
    .app { max-width: 560px; margin: 0 auto; padding: 16px 0 28px; }
    .header {
      background: linear-gradient(135deg, #111827, #334155);
      color: white;
      border-radius: 28px;
      padding: 22px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: 28px; }
    .subtitle { margin: 6px 0 0; color: #cbd5e1; font-size: 14px; line-height: 1.5; }
    .date-label {
      margin-top: 14px;
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 13px;
    }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
    .stat { background: rgba(255,255,255,0.12); border-radius: 18px; padding: 12px; }
    .stat span { display: block; font-size: 12px; color: #cbd5e1; }
    .stat strong { display: block; margin-top: 4px; font-size: 24px; }
    .card { background: var(--card); border-radius: 26px; padding: 16px; box-shadow: var(--shadow); margin-bottom: 14px; }
    input, select, button, textarea { font: inherit; }
    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 15px;
      font-size: 16px;
      outline: none;
      background: white;
    }
    .input:focus { border-color: #475569; }
    .grid2 { display: grid; grid-template-columns: 1fr 110px; gap: 8px; margin-top: 8px; }
    .grid2b { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .memo { min-height: 74px; resize: vertical; margin-top: 8px; }
    .add-btn {
      width: 100%;
      border: none;
      margin-top: 10px;
      border-radius: 18px;
      padding: 15px;
      background: var(--main);
      color: white;
      font-weight: 800;
      font-size: 16px;
    }
    .filters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .filter-btn {
      border: none;
      border-radius: 999px;
      padding: 11px 8px;
      background: white;
      color: var(--muted);
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
    }
    .filter-btn.active { background: var(--main); color: white; }
    .sort-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .sort-row select { flex: 1; }
    .task-list { display: grid; gap: 10px; }
    .task {
      background: white;
      border-radius: 24px;
      padding: 15px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
      border: 1px solid transparent;
    }
    .task.overdue { border-color: #fecaca; background: #fff7f7; }
    .task.done { opacity: 0.62; }
    .task-main { display: flex; gap: 10px; align-items: flex-start; }
    .check {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 2px solid #94a3b8;
      background: white;
      flex: none;
      display: grid;
      place-items: center;
      color: white;
      margin-top: 1px;
    }
    .task.done .check { background: #16a34a; border-color: #16a34a; }
    .task-content { flex: 1; min-width: 0; }
    .task-title { font-weight: 800; font-size: 16px; line-height: 1.45; word-break: break-word; }
    .task.done .task-title { text-decoration: line-through; }
    .task-memo { color: var(--muted); font-size: 13px; margin-top: 6px; white-space: pre-wrap; word-break: break-word; }
    .badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .badge { border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 800; }
    .p-high { background: #fee2e2; color: #b91c1c; }
    .p-mid { background: #fef3c7; color: #92400e; }
    .p-low { background: #dcfce7; color: #166534; }
    .due { background: #e0f2fe; color: #075985; }
    .owner { background: #ede9fe; color: #5b21b6; }
    .overdue-badge { background: #fee2e2; color: #b91c1c; }
    .actions { display: flex; gap: 6px; margin-left: 4px; }
    .small-btn {
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 14px;
      background: #f1f5f9;
      color: #334155;
      font-weight: 900;
    }
    .delete { color: var(--danger); }
    .empty, .status {
      text-align: center;
      color: var(--muted);
      background: white;
      border-radius: 24px;
      padding: 24px 18px;
      box-shadow: var(--shadow);
      line-height: 1.6;
    }
    .error { color: #b91c1c; background: #fff7f7; border: 1px solid #fecaca; }
    .footer-note { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; line-height: 1.6; }
    @media (max-width: 360px) {
      .filters { grid-template-columns: repeat(2, 1fr); }
      .grid2b { grid-template-columns: 1fr; }
      h1 { font-size: 25px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>共有仕事TODO</h1>
      <p class="subtitle">同じURLを開いた人とTODOを共有できます</p>
      <div class="date-label" id="todayLabel"></div>
      <div class="stats">
        <div class="stat"><span>未完了</span><strong id="remainCount">0</strong></div>
        <div class="stat"><span>今日まで</span><strong id="todayCount">0</strong></div>
        <div class="stat"><span>完了</span><strong id="doneCount">0</strong></div>
      </div>
    </section>

    <section class="card">
      <input id="titleInput" class="input" type="text" placeholder="TODOを入力 例：朝礼ネタを準備" autocomplete="off" />
      <div class="grid2">
        <input id="dueInput" class="input" type="date" />
        <select id="priorityInput" class="input">
          <option value="高">高</option>
          <option value="中" selected>中</option>
          <option value="低">低</option>
        </select>
      </div>
      <div class="grid2b">
        <input id="ownerInput" class="input" type="text" placeholder="担当 任意" autocomplete="off" />
        <input id="roomInput" class="input" type="text" value="main" placeholder="共有ルーム名" autocomplete="off" />
      </div>
      <textarea id="memoInput" class="input memo" placeholder="メモ 任意：詳細・引き継ぎ内容など"></textarea>
      <button class="add-btn" id="addBtn">＋ 追加する</button>
    </section>

    <div class="filters">
      <button class="filter-btn active" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="today">今日まで</button>
      <button class="filter-btn" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="done">完了</button>
    </div>

    <div class="sort-row">
      <select id="sortInput" class="input">
        <option value="due">期限が近い順</option>
        <option value="priority">優先度が高い順</option>
        <option value="new">新しい順</option>
        <option value="old">古い順</option>
      </select>
    </div>

    <section class="task-list" id="taskList">
      <div class="status">読み込み中...</div>
    </section>
    <p class="footer-note">データはFirebase Firestoreに保存されます。<br>同じ共有ルーム名なら複数人で同期されます。</p>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, addDoc, doc, updateDoc, deleteDoc,
      onSnapshot, serverTimestamp, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB1WXL_C3eok1jgKsaKMhfZhB858lD_hsU",
      authDomain: "test-723b9.firebaseapp.com",
      projectId: "test-723b9",
      storageBucket: "test-723b9.firebasestorage.app",
      messagingSenderId: "1039966073320",
      appId: "1:1039966073320:web:a555471882d2362e25345d"
    };

    const titleInput = document.getElementById("titleInput");
    const dueInput = document.getElementById("dueInput");
    const priorityInput = document.getElementById("priorityInput");
    const ownerInput = document.getElementById("ownerInput");
    const roomInput = document.getElementById("roomInput");
    const memoInput = document.getElementById("memoInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const sortInput = document.getElementById("sortInput");
    const remainCount = document.getElementById("remainCount");
    const doneCount = document.getElementById("doneCount");
    const todayCount = document.getElementById("todayCount");
    const todayLabel = document.getElementById("todayLabel");

    let tasks = [];
    let filter = "active";
    let unsubscribe = null;

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function todayString() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }

    function formatDateLabel(dateString) {
      if (!dateString) return "";
      const parts = dateString.split("-");
      return `${Number(parts[1])}/${Number(parts[2])}`;
    }

    function setTodayLabel() {
      const d = new Date();
      const week = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];
      todayLabel.textContent = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${week}）`;
    }

    function getRoomName() {
      const room = roomInput.value.trim() || "main";
      return room.replace(/[\\/#?\[\]]/g, "_");
    }

    function getTasksCollection() {
      return collection(db, "todoRooms", getRoomName(), "tasks");
    }

    function startListening() {
      if (unsubscribe) unsubscribe();
      taskList.innerHTML = '<div class="status">読み込み中...</div>';
      const q = query(getTasksCollection(), orderBy("createdAt", "desc"));
      unsubscribe = onSnapshot(q, (snapshot) => {
        tasks = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
        render();
      }, (error) => {
        console.error(error);
        taskList.innerHTML = '<div class="status error">Firebaseの読み込みに失敗しました。Firestoreルールを確認してください。</div>';
      });
    }

    async function addTask() {
      const title = titleInput.value.trim();
      if (!title) {
        titleInput.focus();
        return;
      }

      addBtn.disabled = true;
      try {
        await addDoc(getTasksCollection(), {
          title,
          due: dueInput.value,
          priority: priorityInput.value,
          owner: ownerInput.value.trim(),
          memo: memoInput.value.trim(),
          done: false,
          createdAt: serverTimestamp(),
          createdAtClient: Date.now(),
          updatedAt: serverTimestamp()
        });

        titleInput.value = "";
        dueInput.value = "";
        priorityInput.value = "中";
        memoInput.value = "";
        titleInput.focus();
      } catch (error) {
        console.error(error);
        alert("追加に失敗しました。Firestoreルールを確認してください。");
      } finally {
        addBtn.disabled = false;
      }
    }

    async function toggleTask(id, done) {
      try {
        await updateDoc(doc(getTasksCollection(), id), {
          done: !done,
          updatedAt: serverTimestamp()
        });
      } catch (error) {
        console.error(error);
        alert("更新に失敗しました。");
      }
    }

    async function deleteTask(id, title) {
      if (!confirm(`「${title}」を削除しますか？`)) return;
      try {
        await deleteDoc(doc(getTasksCollection(), id));
      } catch (error) {
        console.error(error);
        alert("削除に失敗しました。");
      }
    }

    function isTodayOrOverdue(task) {
      return !task.done && task.due && task.due <= todayString();
    }

    function priorityScore(priority) {
      return { "高": 3, "中": 2, "低": 1 }[priority] || 0;
    }

    function getCreatedValue(task) {
      if (task.createdAt && task.createdAt.seconds) return task.createdAt.seconds * 1000;
      return task.createdAtClient || 0;
    }

    function getVisibleTasks() {
      let list = [...tasks];
      if (filter === "active") list = list.filter(task => !task.done);
      if (filter === "today") list = list.filter(task => isTodayOrOverdue(task));
      if (filter === "done") list = list.filter(task => task.done);

      const sort = sortInput.value;
      list.sort((a, b) => {
        if (sort === "priority") return priorityScore(b.priority) - priorityScore(a.priority) || (a.due || "9999").localeCompare(b.due || "9999");
        if (sort === "new") return getCreatedValue(b) - getCreatedValue(a);
        if (sort === "old") return getCreatedValue(a) - getCreatedValue(b);
        return (a.due || "9999-12-31").localeCompare(b.due || "9999-12-31") || priorityScore(b.priority) - priorityScore(a.priority);
      });
      return list;
    }

    function badgeClass(priority) {
      if (priority === "高") return "p-high";
      if (priority === "低") return "p-low";
      return "p-mid";
    }

    function renderStats() {
      remainCount.textContent = tasks.filter(task => !task.done).length;
      doneCount.textContent = tasks.filter(task => task.done).length;
      todayCount.textContent = tasks.filter(task => isTodayOrOverdue(task)).length;
    }

    function render() {
      renderStats();
      const list = getVisibleTasks();
      taskList.innerHTML = "";

      if (list.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "表示するTODOがありません";
        taskList.appendChild(empty);
        return;
      }

      for (const task of list) {
        const article = document.createElement("article");
        article.className = `task ${task.done ? "done" : ""} ${isTodayOrOverdue(task) ? "overdue" : ""}`;

        const dueBadge = task.due ? `<span class="badge due">期限：${formatDateLabel(task.due)}</span>` : "";
        const ownerBadge = task.owner ? `<span class="badge owner">担当：${escapeHtml(task.owner)}</span>` : "";
        const overdueBadge = isTodayOrOverdue(task) ? `<span class="badge overdue-badge">今日まで</span>` : "";

        article.innerHTML = `
          <div class="task-main">
            <button class="check" aria-label="完了切替">✓</button>
            <div class="task-content">
              <div class="task-title"></div>
              ${task.memo ? `<div class="task-memo"></div>` : ""}
              <div class="badges">
                <span class="badge ${badgeClass(task.priority)}">優先度：${task.priority || "中"}</span>
                ${dueBadge}
                ${ownerBadge}
                ${overdueBadge}
              </div>
            </div>
            <div class="actions">
              <button class="small-btn delete" aria-label="削除">×</button>
            </div>
          </div>
        `;

        article.querySelector(".task-title").textContent = task.title || "無題";
        const memoEl = article.querySelector(".task-memo");
        if (memoEl) memoEl.textContent = task.memo || "";
        article.querySelector(".check").addEventListener("click", () => toggleTask(task.id, !!task.done));
        article.querySelector(".delete").addEventListener("click", () => deleteTask(task.id, task.title || "無題"));
        taskList.appendChild(article);
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>'"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" }[c]));
    }

    addBtn.addEventListener("click", addTask);
    titleInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") addTask();
    });
    sortInput.addEventListener("change", render);
    roomInput.addEventListener("change", startListening);

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        filter = btn.dataset.filter;
        render();
      });
    });

    setTodayLabel();
    startListening();
  </script>
</body>
</html>
